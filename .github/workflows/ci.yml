name: PlantSnap CI

# Run on every push to main and on every pull request targeting main.
on:
  push:
    branches: [ main, testing ]
  pull_request:
    branches: [ main, testing ]

jobs:
  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ──────────────────────────────────────────────────────────────
      # The project uses compileOptions VERSION_11, so JDK 17 is a safe choice —
      # it supports Java 11 bytecode and is the current Android Gradle default.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle cache ──────────────────────────────────────────────────────
      # Cache key covers all Gradle files and the version catalog so the cache
      # is invalidated automatically when any dependency changes.
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 4. Secrets → local.properties ────────────────────────────────────────
      # API keys live in GitHub repository secrets and are injected here at
      # build time. They are read by BuildConfig fields in build.gradle.kts.
      #
      # Add these under: GitHub repo → Settings → Secrets → Actions
      #   PLANTNET_API_KEY
      #   SUPABASE_URL
      #   SUPABASE_ANON_KEY
      #   LLM_API_KEY
      - name: Write local.properties from secrets
        run: |
          cat >> local.properties << EOF
          PLANTNET_API_KEY=${{ secrets.PLANTNET_API_KEY }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          EOF

      # ── 5. Gradle permissions ─────────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 6. Build debug + test APKs ────────────────────────────────────────────
      # Assembling first surfaces compile errors with a clean message rather than
      # letting the emulator step fail mid-run with a cryptic Gradle error.
      - name: Build debug APK
        run: ./gradlew assembleDebug assembleDebugAndroidTest --stacktrace

      # ── 7. Enable KVM acceleration ────────────────────────────────────────────
      # GitHub's ubuntu-latest runners support KVM, which makes the emulator
      # ~10x faster than software-only rendering. Without this the udev rule
      # exists but the kvm group lacks write permission.
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── 8. Run UI tests on emulator ───────────────────────────────────────────
      #
      # api-level: 35  (not 36)
      # ─────────────────────────────────────────────────────────────────────────
      # The project compiles against SDK 36 (Android 16 preview), but the
      # reactivecircus/android-emulator-runner action requires a stable AOSP
      # system image. API 36 images are not yet available as stable releases on
      # GitHub-hosted runners. API 35 (Android 15) is the highest stable image
      # and is fully compatible with minSdk 26 — the emulator can run any app
      # whose minSdk is ≤ 35.
      #
      # Update api-level to 36 here once a stable AOSP image ships.
      # ─────────────────────────────────────────────────────────────────────────
      - name: Run UI tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          profile: Nexus 6
          avd-name: plantsnap_ci_avd
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest --stacktrace

      # ── 9. Upload test results ─────────────────────────────────────────────────
      # Uploaded regardless of pass/fail so the HTML report is always available
      # in the Actions → Artifacts tab for inspection.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: |
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
          retention-days: 14
